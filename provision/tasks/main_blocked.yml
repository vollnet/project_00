    - name: Current time initial automation
      debug:
        msg: "{{ '%H:%M:%S' | strftime }}"

    - name: Initial ping VM target
      ping:

    - name: Atualizar apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Copy sudoers file config from vm-work to vm-guest
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: /etc/
        mode: '0440'
      loop:
        - /home/vollnet/vms-vollnet/{{ vm_name }}/configs/sudoers

    - name: Copy ssh-config file from vm-work to vm-guest
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: /etc/ssh/
        mode: '0644'
      loop:
        - /home/vollnet/vms-vollnet/{{ vm_name }}/configs/sshd_config

