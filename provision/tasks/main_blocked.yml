    # Stage-2 Vagrant Configuration
    #
    - name: Set PasswordAuthentication for the VM-Vagrant
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'

    - name: Set User Group for the VM-Vagrant
      user:
        name: vagrant
        shell: /bin/bash
        groups: sudo
        append: yes

    - name: Permission for user vagrant
      lineinfile:
        path: /etc/sudoers
        state: present
        regexp: '^%vagrant'
        line: '%vagrant ALL=(ALL) NOPASSWD: ALL'
        validate: 'visudo -cf %s'

    - name: Add public key for vagrant user
      authorized_key:
        user: vagrant
        key: "{{ lookup('file', '/home/vollnet/.ssh/id_ed25519.pub') }}"
        state: present

