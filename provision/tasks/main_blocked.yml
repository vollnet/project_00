# This playbook is designed to provision a VM with Docker, Nginx, Portainer, Node.js, MongoDB
# and Git. Also configures SSH access, sudo permissions, and sets the timezone. The playbook 
# is structured in stages for clarity and modularity.
#
# Usage:
#
# 1. Ensure you have Ansible installed on your control machine.
# 2. Update the inventory file with the target VM's IP address or hostname.
# 3. Run this playbook via Vagrantfile, only!
#

# HERMES Plataform (Mensageiro dos deuses, deus do comércio e viagens)
# 
# Imperativo:
