    ollama_data: "/home/vagrant/ollama_data"
    ollama_model: "llama3"
    ollama_port:  11434

    # Docker and Docker-Compose
    vm_name:      "project_00"
    docker_compose_version: "2.29.1"

    # General variables
    timezone:   "America/Sao_Paulo"
 
