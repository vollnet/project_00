
---
# Ansible playbook.yml
# 
# main.yml Vs. 0.0.1-A - 2026/04/10 - Hipervisor KVM

##################################
#                                #
#        Hipervisor KVM          #
#                                #
#         HERMES 001-A           #
#              by                #
